<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ค่าใช้จ่าย เรด้า & อมยิ้ม</title>

<style>

body{
font-family:"Segoe UI",sans-serif;
max-width:420px;
margin:auto;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
padding:20px;
}

h1{
text-align:center;
color:white;
margin-bottom:20px;
}

.card{
background:white;
padding:18px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
font-size:15px;
cursor:pointer;
}

.add{
background:#ff6b81;
color:white;
}

.delete{
background:#ff4757;
color:white;
margin-top:6px;
padding:6px 10px;
font-size:12px;
width:auto;
}

.reset{
background:#ffa502;
color:white;
margin-top:10px;
}

li{
margin-bottom:10px;
}

.note{
font-size:12px;
color:#777;
}

.summary{
margin-top:8px;
font-size:15px;
}

.result{
font-weight:bold;
margin-top:10px;
font-size:16px;
color:#ff4757;
}

</style>
</head>

<body>

<h1>💸 เรด้า & อมยิ้ม</h1>

<div class="card">

<b>เพิ่มค่าใช้จ่าย</b>

<input id="item" placeholder="รายการ เช่น ชาบู">

<input id="price" type="number" placeholder="ราคา">

<select id="payer">
<option>เรด้า</option>
<option>อมยิ้ม</option>
</select>

<select id="type">
<option value="split">หารกัน</option>
<option value="advance">ออกให้ก่อน</option>
</select>

<input id="note" placeholder="หมายเหตุ (ไม่จำเป็น)">

<button class="add" onclick="add()">เพิ่มรายการ</button>

</div>

<div class="card">

<b>รายการวันนี้</b>

<ul id="list"></ul>

</div>

<div class="card">

<b>สรุปวันนี้</b>

<div class="summary" id="summary"></div>

<div class="result" id="result"></div>

<button class="reset" onclick="resetDay()">เริ่มวันใหม่</button>

</div>

<script>

let today=new Date().toISOString().split("T")[0]

let allData=JSON.parse(localStorage.getItem("couple_expenses"))||{}

if(!allData[today]){
allData[today]=[]
}

let data=allData[today]

function save(){
allData[today]=data
localStorage.setItem("couple_expenses",JSON.stringify(allData))
}

function add(){

let item=document.getElementById("item").value
let price=Number(document.getElementById("price").value)
let payer=document.getElementById("payer").value
let type=document.getElementById("type").value
let note=document.getElementById("note").value

if(!item||!price)return

data.push({item,price,payer,type,note})

document.getElementById("item").value=""
document.getElementById("price").value=""
document.getElementById("note").value=""

save()
render()

}

function deleteItem(i){

data.splice(i,1)

save()
render()

}

function resetDay(){

if(confirm("เริ่มวันใหม่?")){
data=[]
save()
render()
}

}

function render(){

let list=document.getElementById("list")
list.innerHTML=""

let balance=0

data.forEach((d,i)=>{

list.innerHTML+=`
<li>
${d.item} - ${d.price} บาท (${d.payer})
<br>
<span class="note">${d.type=="split"?"หารกัน":"ออกให้ก่อน"} ${d.note? "- "+d.note:""}</span>
<br>
<button class="delete" onclick="deleteItem(${i})">ลบ</button>
</li>
`

if(d.type=="split"){

let half=d.price/2

if(d.payer=="เรด้า"){
balance+=half
}else{
balance-=half
}

}else{

if(d.payer=="เรด้า"){
balance+=d.price
}else{
balance-=d.price
}

}

})

document.getElementById("summary").innerText="ยอดคงค้าง: "+balance+" บาท"

let result=""

if(balance>0){
result="อมยิ้มต้องคืนเรด้า "+balance+" บาท"
}else if(balance<0){
result="เรด้าต้องคืนอมยิ้ม "+Math.abs(balance)+" บาท"
}else{
result="จ่ายพอดีกัน"
}

document.getElementById("result").innerText="สรุป: "+result

}

render()

</script>

</body>
</html>
