<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ค่าใช้จ่าย เรด้า & อมยิ้ม</title>

<style>

body{
font-family:"Segoe UI",sans-serif;
max-width:420px;
margin:auto;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
padding:20px;
}

h1{
text-align:center;
color:white;
}

.card{
background:white;
padding:18px;
border-radius:16px;
margin-top:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.add{
background:#ff6b81;
color:white;
width:100%;
}

.delete{
background:#ff4757;
color:white;
margin-top:5px;
}

.reset{
background:#ffa502;
color:white;
width:100%;
margin-top:10px;
}

.note{
font-size:12px;
color:#777;
}

.result{
font-weight:bold;
margin-top:10px;
font-size:16px;
color:#ff4757;
}

</style>
</head>

<body>

<h1>💸 เรด้า & อมยิ้ม</h1>

<div class="card">

<b>เพิ่มค่าใช้จ่าย</b>

<input id="item" placeholder="รายการ">

<input id="price" type="number" placeholder="ราคา">

<select id="payer">
<option>เรด้า</option>
<option>อมยิ้ม</option>
</select>

<select id="type">
<option value="split">หารกัน</option>
<option value="advance">ออกให้ก่อน</option>
</select>

<input id="note" placeholder="หมายเหตุ">

<button class="add" onclick="add()">เพิ่มรายการ</button>

</div>

<div class="card">

<b>รายการ</b>

<ul id="list"></ul>

</div>

<div class="card">

<b>สรุป</b>

<div id="result" class="result"></div>

<button class="reset" onclick="resetDay()">เริ่มวันใหม่</button>

</div>

<script>

let data=JSON.parse(localStorage.getItem("couple_expenses"))||[]

function save(){
localStorage.setItem("couple_expenses",JSON.stringify(data))
}

function add(){

let item=document.getElementById("item").value
let price=Number(document.getElementById("price").value)
let payer=document.getElementById("payer").value
let type=document.getElementById("type").value
let note=document.getElementById("note").value

if(!item||!price)return

data.push({item,price,payer,type,note})

document.getElementById("item").value=""
document.getElementById("price").value=""
document.getElementById("note").value=""

save()
render()

}

function deleteItem(i){

data.splice(i,1)

save()
render()

}

function resetDay(){

if(confirm("เริ่มวันใหม่?")){
data=[]
save()
render()
}

}

function render(){

let list=document.getElementById("list")
list.innerHTML=""

let oweReda=0
let oweOmyim=0

data.forEach((d,i)=>{

list.innerHTML+=`
<li>
${d.item} - ${d.price} บาท (${d.payer})
<br>
<span class="note">${d.type=="split"?"หารกัน":"ออกให้ก่อน"} ${d.note? "- "+d.note:""}</span>
<br>
<button class="delete" onclick="deleteItem(${i})">ลบ</button>
</li>
`

if(d.type=="split"){

let half=d.price/2

if(d.payer=="เรด้า"){
oweReda+=half
}else{
oweOmyim+=half
}

}else{

if(d.payer=="เรด้า"){
oweReda+=d.price
}else{
oweOmyim+=d.price
}

}

})

let result=""

if(oweReda>oweOmyim){

result="อมยิ้มต้องคืนเรด้า "+(oweReda-oweOmyim)+" บาท"

}else if(oweOmyim>oweReda){

result="เรด้าต้องคืนอมยิ้ม "+(oweOmyim-oweReda)+" บาท"

}else{

result="จ่ายพอดีกัน"

}

document.getElementById("result").innerText=result

}

render()

</script>

</body>
</html>
